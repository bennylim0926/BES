name: CI

on:
  push:
    branches: ['**']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('BES/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build JAR
        run: mvn clean package -DskipTests -f BES/pom.xml

  backend-test:
    name: Backend / Tests
    runs-on: ubuntu-latest
    needs: [backend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('BES/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Run tests
        run: mvn test -f BES/pom.xml

  frontend-build:
    name: Frontend / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: BES-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: BES-frontend
      - name: Build
        run: npm run build
        working-directory: BES-frontend

  frontend-test:
    name: Frontend / Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: BES-frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: BES-frontend
      - name: Run tests
        run: npm test
        working-directory: BES-frontend

  analysis:
    name: Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('BES/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: BES-frontend/package-lock.json
      - name: SpotBugs
        run: mvn spotbugs:check -DskipTests -f BES/pom.xml
      - name: Install frontend deps
        run: npm ci
        working-directory: BES-frontend
      - name: ESLint
        run: npm run lint
        working-directory: BES-frontend

  migrations:
    name: Migrations / Flyway against Postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: besdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Guard against hash-named constraints
        run: |
          # Hibernate-generated FK constraint names (e.g. fk5nearhompurfhv6qrt792v4pj)
          # differ per database. Migrations must not reference them by name —
          # use a pg_constraint lookup instead.
          if grep -rnE 'CONSTRAINT[[:space:]]+fk[a-z0-9]{20,}' \
               BES/src/main/resources/db/migration/; then
            echo "::error::Migration references a Hibernate-hash constraint name above."
            echo "Hash names are database-specific and will fail in prod."
            echo "Look up the constraint dynamically via pg_constraint instead."
            exit 1
          fi
          echo "✓ No hash-named constraints found in migrations."
      - name: Run all Flyway migrations
        run: |
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/BES/src/main/resources/db/migration:/flyway/sql" \
            flyway/flyway \
            -url=jdbc:postgresql://localhost:5432/besdb \
            -user=postgres \
            -password=test \
            -connectRetries=10 \
            migrate

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [backend-build, backend-test, frontend-build, frontend-test, analysis, migrations]
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Post CI results comment
        uses: actions/github-script@v7
        with:
          script: |
            const results = {
              'Backend / Build':  '${{ needs.backend-build.result }}',
              'Backend / Tests':  '${{ needs.backend-test.result }}',
              'Frontend / Build': '${{ needs.frontend-build.result }}',
              'Frontend / Tests': '${{ needs.frontend-test.result }}',
              'Analysis':         '${{ needs.analysis.result }}',
              'Migrations':       '${{ needs.migrations.result }}',
            }

            const icon = r => r === 'success' ? '✅ Pass' : r === 'skipped' ? '⏭️ Skipped' : '❌ Fail'
            const allPassed = Object.values(results).every(r => r === 'success')

            let body = '## CI Results\n\n| Check | Status |\n|-------|--------|\n'
            for (const [name, result] of Object.entries(results)) {
              body += `| ${name} | ${icon(result)} |\n`
            }

            if (allPassed) {
              body += '\n---\n✅ All checks passed.'
            } else {
              body += '\n---\nCI found issues. Want me to investigate and fix the failing checks?\nReply: `@claude investigate and fix the failing CI checks`'
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c => c.user.login === 'github-actions[bot]' && c.body.startsWith('## CI Results'))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
