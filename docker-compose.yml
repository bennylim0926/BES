services:
  backend:
    image: 'docker-spring-boot-postgres:latest'
    build:
      context: .
    container_name: bes_backend
    depends_on:
      - postgres
    environment:
      - EMAIL=${EMAIL}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - DOMAIN=${DOMAIN}
      - BES_COOKIE_DOMAIN=${BES_COOKIE_DOMAIN}
      - BES_ADMIN_PASSWORD=${BES_ADMIN_PASSWORD}
      - BES_EMCEE_PASSWORD=${BES_EMCEE_PASSWORD}
      - BES_JUDGE_PASSWORD=${BES_JUDGE_PASSWORD}
      - BES_ORGANISER_PASSWORD=${BES_ORGANISER_PASSWORD}
      - BES_ALLOWED_ORIGINS=${BES_ALLOWED_ORIGINS}
    volumes:
    - ./credentials.json:/credentials.json:ro

  frontend:
    build:
      context: ./BES-frontend
    image: vue-frontend-latest
    container_name: bes_frontend
    ports:
     - "80:80" 
     - "443:443"
    depends_on:
      - backend
  
  postgres:
    image: 'postgres:15.2'
    ports:
    - '5433:5432'
    environment:
    - POSTGRES_USER=${SPRING_DATASOURCE_USERNAME}
    - POSTGRES_DB=${SPRING_DATASOURCE_DBNAME}
    - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    volumes:
    - postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres:
